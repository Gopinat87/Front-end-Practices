<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" >
        <h2>Login</h2>
        <form action="https://www.flipkart.com/" target="_blank">
            <div class="input">
                <label class="Name">User Name</LAbel>
                <input type="text" name="Name" id="Name" required>
            </div>
            <div class="input">
                <label class="Name" for="Email">Email</label>
                <input type="email" name="Email" for="Email" required>
            </div>
            <div class="input">
                <Label class="Name" for="Passsword">Passsword</Label>
                <input type="password" name="Passsword" for="Passsword" required>
            </div>
            <div class="Gender">
                <label class="genderlabel">Gender :</label>
                <input name="Gender" id="Male" type="radio" required>
                <label for="Male">Male</label>
                <input name="Gender" id="Female" type="radio" required>
                <label for="Female">Female</label>
            </div>
            <div class="SUBMIT">
                <button type="submit">SUBMIT</button>

            </div>
        </form>
    </div>
</body>
</html>
